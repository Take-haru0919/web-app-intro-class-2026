<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO App</title>
  </head>
  <body>

    <header>
      <h1>TODO App  -毎日管理-</h1>
    </header>

    <main>
    <form id="todo-form">
        <input type="text" id="todo-input"
               placeholder="新しいTODOを入力">
        <button type="submit">追加</button>
    </form>
    <ul id="todo-list">
        <li>
            <label>
                <input type="checkbox">
                <span>買い物に行く</span>
            </label>
            <button>削除</button>
        </li>
        <li>
          <label>
                <input type="checkbox">
                <span>学校に行く</span>
            </label>
            <button>削除</button>
        </li>
        <li>
          <label>
                <input type="checkbox">
                <span>映画を見る</span>
            </label>
            <button>削除</button>
        </li>
    </ul>
    </main>
  </body>
</html>
